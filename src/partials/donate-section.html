<section id="donate" class="bg-[#050505] text-white overflow-hidden py-8 md:py-12 xl:py-16">
    <div class="container-custom relative z-10">


        <div class="flex  items-center gap-4 w-full mb-6">

            <span data-i18n="donate.tag"
                class="text-red-600 font-black text-sm uppercase leading-tight whitespace-nowrap md:whitespace-normal">Падтрымка</span>
            <div class="flex-1 h-px bg-red-600"></div>
        </div>


        <h2 data-i18n="donate.title"
            class="text-2xl md:text-3xl xl:text-5xl font-black uppercase tracking-tighter mb-10">
            Фінансаванне перамогі</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">

            <div data-donation-type="foundation"
                class="group relative bg-black/80 border border-white/10 p-4 md:p-6 overflow-hidden hover:border-red-600/50 transition-all cursor-pointer shadow-2xl">

                <div class="absolute top-0 right-0 p-4 md:p-6 opacity-5 group-hover:opacity-20 transition-opacity z-0">
                    <i
                        class="fa-solid fa-building-columns text-3xl md:text-4xl xl:text-6xl text-red-600 transition-transform duration-500 group-hover:-rotate-6 group-hover:scale-110"></i>
                </div>

                <div class="relative z-10 flex flex-col items-start gap-6 h-full">
                    <h3 data-i18n="donate.support_fund"
                        class="text-2xl md:text-3xl font-black text-white uppercase italic  tracking-tighter group-hover:text-red-600 transition-colors min-h-[3.5rem] md:min-h-[4.5rem] flex items-center">
                        Падтрымаць фонд
                    </h3>

                    <p data-i18n="donate.support_fund_text"
                        class="text-gray-400 text-sm md:text-base max-w-full font-light leading-relaxed italic flex-grow">
                        Адміністрацыйныя выдаткі, юрыдычны шчыт, лагістыка і развіццё інстытуцыі. Трывалая база для
                        нашай працы.
                    </p>

                    <div
                        class="group inline-flex items-center gap-2 hover:text-white text-red-600 text-xs font-black uppercase w-fit mt-auto">
                        <span data-i18n="donate.requisites_btn">Рэквізіты</span>
                        <i class="fa-solid fa-chevron-right group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </div>
            </div>

            <div data-donation-type="soldiers"
                class="group relative bg-black/80 border border-white/10 p-4 md:p-6 overflow-hidden hover:border-red-600/50 transition-all cursor-pointer shadow-2xl">
                <div class="absolute top-0 right-0 p-4 md:p-6 opacity-5 group-hover:opacity-20 transition-opacity z-0">
                    <i
                        class="fa-solid fa-shield-halved text-3xl md:text-4xl xl:text-6xl text-red-600 transition-transform duration-500 group-hover:-rotate-6 group-hover:scale-110"></i>
                </div>

                <div class="relative z-10 flex flex-col items-start gap-6 h-full">
                    <h3 data-i18n="donate.help_soldiers"
                        class="text-2xl md:text-3xl font-black text-white uppercase italic  tracking-tighter group-hover:text-red-600 transition-colors min-h-[3.5rem] md:min-h-[4.5rem] flex items-center">
                        Падтрымаць байцоў
                    </h3>

                    <p data-i18n="donate.help_soldiers_text"
                        class="text-gray-400 text-sm md:text-base max-w-full font-light leading-relaxed italic flex-grow">
                        Легалізацыя, юрыдычная, псіхалагічная дапамога і сацыяльная рэабілітацыя
                    </p>

                    <div
                        class="group inline-flex items-center gap-2 hover:text-white text-red-600 text-xs font-black uppercase w-fit mt-auto">
                        <span data-i18n="donate.requisites_btn">Рэквізіты</span>
                        <i class="fa-solid fa-chevron-right group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
