<div id="material-modal" role="dialog" aria-modal="true" aria-labelledby="modal-meta"
    class="fixed inset-0 z-[110] hidden overflow-hidden">

    <div class="absolute inset-0 bg-black/80 backdrop-blur-md modal-overlay"></div>

    <div class="container-custom relative h-full mx-auto bg-[#050505] flex flex-col shadow-2xl p-0">

        <div class="px-4 md:px-8 xl:px-12 py-4 bg-[#050505] z-30 flex justify-between items-center">
            <div id="modal-meta" class="text-red-600 font-bold uppercase tracking-[0.3em] text-xs md:text-sm">
            </div>
            <button id="close-modal" aria-label="Закрыць акно" data-i18n="[aria-label]ui.close_modal"
                class="text-red-600 hover:text-white text-xl transition-all">
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            </button>
        </div>

        <div id="modal-dynamic-container" class="flex-grow overflow-y-auto custom-scrollbar">
        </div>

        <div class="p-4 md:px-8 xl:px-12 border-t border-white/10 bg-[#050505] flex justify-between items-center z-20">
            <div class="flex gap-3 md:gap-6">
                <button id="print-material" aria-label="Надрукаваць матэрыял" data-i18n="[aria-label]modal.print_aria"
                    class="flex items-center gap-1 text-xs font-black uppercase text-red-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-print" aria-hidden="true"></i>
                    <span data-i18n="modal.print">Print</span>
                </button>
                <button id="copy-material" aria-label="Скапіяваць матэрыял" data-i18n="[aria-label]modal.copy_aria"
                    class="flex items-center gap-1 text-xs font-black uppercase text-red-600 hover:text-white transition-colors">
                    <i class="fa-solid fa-copy" aria-hidden="true"></i>
                    <span id="copy-text" data-i18n="modal.copy">Copy</span>
                </button>
            </div>
            <button id="close-modal-text" aria-label="Закрыць акно" data-i18n="[aria-label]modal.close_aria"
                class="text-xs font-black uppercase text-red-600 hover:text-white transition-colors">
                <span data-i18n="modal.close">Закрыць</span>
            </button>
        </div>

    </div>
</div>
