<div id="material-modal" class="fixed inset-0 z-[110] hidden overflow-hidden">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-md modal-overlay"></div>

    <div class="container-custom relative h-full mx-auto bg-[#050505] flex flex-col shadow-2xl p-0">

        <header class="px-4 md:px-8 xl:px-12 py-4  bg-[#050505] z-30 flex justify-between items-center">
            <div id="modal-meta" class="text-red-600 font-bold uppercase tracking-[0.3em] text-xs md:text-sm">
            </div>
            <button id="close-modal" class="text-white hover:text-red-600 text-xl transition-all">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </header>

        <main id="modal-dynamic-container" class="flex-grow overflow-y-auto custom-scrollbar">
        </main>

        <footer
            class="p-4 md:px-8 xl:px-12 border-t border-white/10 bg-[#050505] flex justify-between items-center z-20">
            <div class="flex gap-6">
                <button id="print-material"
                    class="flex items-center gap-2 text-xs font-black tracking-[0.3em] text-white hover:text-red-600 transition-colors uppercase">
                    <i class="fa-solid fa-print"></i>
                    [ <span data-i18n="modal.print">Print</span> ]
                </button>
                <button id="copy-material"
                    class="flex items-center gap-2 text-xs font-black tracking-[0.3em] text-white hover:text-red-600 transition-colors uppercase">
                    <i class="fa-solid fa-copy"></i>
                    [ <span id="copy-text" data-i18n="modal.copy">Copy</span> ]
                </button>
            </div>
            <button id="close-modal-text"
                class="text-xs font-black tracking-[0.3em] text-white hover:text-red-600 transition-colors uppercase">
                [ <span data-i18n="modal.close">Закрыць</span> ]
            </button>
        </footer>
    </div>
</div>
